<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UK Live Map</title>
    <link rel="stylesheet" href="leaflet.css"/>
    <script src="leaflet.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    // Initialise map centred on the United Kingdom
    var map = L.map('map').setView([54.5, -2.0], 6);

    // OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Layer group for aircraft markers – populated by the Python backend via pywebview
    var aircraftLayer = L.layerGroup().addTo(map);

    // Expose a function so the Python backend can push aircraft positions
    function updateAircraft(icao, lat, lon, callsign, altitude) {
        var marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 0.8
        }).bindTooltip(callsign + ' @ ' + altitude + ' ft');
        aircraftLayer.addLayer(marker);
    }

    // Clear all aircraft markers
    function clearAircraft() {
        aircraftLayer.clearLayers();
    }
</script>
</body>
</html>
