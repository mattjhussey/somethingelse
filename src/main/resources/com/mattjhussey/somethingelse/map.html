<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UK Live Map</title>
    <link rel="stylesheet" href="leaflet.css"/>
    <script src="leaflet.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    // Initialise map centred on the United Kingdom
    var map = L.map('map').setView([54.5, -2.0], 6);

    // OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Layer group for aircraft markers – populated by the Java layer via WebEngine.executeScript()
    var aircraftLayer = L.layerGroup().addTo(map);

    // Expose a function so the Java backend can push aircraft positions
    function updateAircraft(icao, lat, lon, callsign, altitude) {
        var marker = L.circleMarker([lat, lon], {
            radius: 6,
            color: '#e74c3c',
            fillColor: '#e74c3c',
            fillOpacity: 0.8
        }).bindTooltip(callsign + ' @ ' + altitude + ' ft');
        aircraftLayer.addLayer(marker);
    }

    // Clear all aircraft markers
    function clearAircraft() {
        aircraftLayer.clearLayers();
    }

    // Easter egg: type the Konami code (↑ ↑ ↓ ↓ ← → ← → B A) to reveal a secret
    (function () {
        var sequence = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
        var pos = 0;
        document.addEventListener('keydown', function (e) {
            if (e.keyCode === sequence[pos]) {
                pos++;
                if (pos === sequence.length) {
                    pos = 0;
                    showLove();
                }
            } else {
                pos = (e.keyCode === sequence[0]) ? 1 : 0;
            }
        });

        function showLove() {
            var overlay = document.createElement('div');
            overlay.style.cssText = [
                'position:fixed', 'inset:0', 'display:flex', 'flex-direction:column',
                'align-items:center', 'justify-content:center',
                'background:rgba(0,0,0,0.55)', 'z-index:9999',
                'font-family:sans-serif', 'color:#fff', 'text-align:center',
                'animation:fadeIn 0.4s ease'
            ].join(';');

            var hearts = document.createElement('div');
            hearts.style.cssText = 'font-size:72px;animation:pulse 0.8s infinite alternate';
            hearts.textContent = '✈️ ❤️ ✈️';

            var msg = document.createElement('div');
            msg.style.cssText = 'font-size:28px;font-weight:bold;margin-top:16px;text-shadow:0 2px 8px rgba(0,0,0,0.5)';
            msg.textContent = 'I love you too!';

            var sub = document.createElement('div');
            sub.style.cssText = 'font-size:16px;margin-top:8px;opacity:0.8';
            sub.textContent = '(now get back to tracking planes ✈)';

            overlay.appendChild(hearts);
            overlay.appendChild(msg);
            overlay.appendChild(sub);
            document.body.appendChild(overlay);

            var style = document.createElement('style');
            style.textContent = [
                '@keyframes fadeIn{from{opacity:0}to{opacity:1}}',
                '@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}'
            ].join('');
            document.head.appendChild(style);

            setTimeout(function () {
                overlay.style.transition = 'opacity 0.8s';
                overlay.style.opacity = '0';
                setTimeout(function () {
                    document.body.removeChild(overlay);
                    document.head.removeChild(style);
                }, 800);
            }, 3500);
        }
    }());
</script>
</body>
</html>
